services:
  - type: web
    name: donna-mvp-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: donna-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: donna-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: donna-db
    databaseName: donna_mvp
    user: donna

redis:
  - name: donna-redis
    ipAllowList: []
